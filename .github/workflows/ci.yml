name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        shell: bash
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "needs gofmt:"
            echo "$out"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -count=1 ./...
      - name: build
        run: go build ./cmd/lt
